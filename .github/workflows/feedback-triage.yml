name: Feedback Triage

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday 9:00 UTC
  workflow_dispatch: # Manual trigger

permissions:
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate community feedback
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const THRESHOLD = 3; // reports needed to create meta-issue
            const LABELS = [
              'community:false-positive',
              'community:missing-pattern',
              'community:empty-result',
              'community:wrong-result',
              'community:perf',
              'community:feature-request'
            ];

            // Fetch all open community issues
            const issues = [];
            for (const label of LABELS) {
              const result = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: label,
                state: 'open',
                per_page: 100
              });
              issues.push(...result.data);
            }

            if (issues.length === 0) {
              console.log('No community feedback issues found.');
              return;
            }

            // Group by pattern (extract from title: "[community:X] description")
            const groups = {};
            for (const issue of issues) {
              // Extract pattern from body (look for "**Pattern:**" or command info)
              const patternMatch = issue.body?.match(/\*\*Category:\*\*\s*(\S+)/);
              const category = patternMatch ? patternMatch[1] : 'unknown';

              // Group by category + similar title keywords
              const titleKey = issue.title
                .replace(/\[community:\w+\]\s*/, '')
                .toLowerCase()
                .trim();

              const key = `${category}:${titleKey}`;
              if (!groups[key]) {
                groups[key] = { category, title: titleKey, issues: [], count: 0 };
              }
              groups[key].issues.push(issue);
              groups[key].count++;
            }

            // Find groups that hit threshold
            const hotGroups = Object.values(groups)
              .filter(g => g.count >= THRESHOLD)
              .sort((a, b) => b.count - a.count);

            if (hotGroups.length === 0) {
              // Post summary even if no threshold hit
              const summary = Object.values(groups)
                .sort((a, b) => b.count - a.count)
                .map(g => `- **${g.title}** (${g.category}): ${g.count} report(s)`)
                .join('\n');

              console.log(`Weekly summary (${issues.length} open issues, none hit threshold):\n${summary}`);
              return;
            }

            // Create meta-issues for hot groups
            for (const group of hotGroups) {
              const linkedIssues = group.issues
                .map(i => `- #${i.number} — ${i.title}`)
                .join('\n');

              // Check if meta-issue already exists
              const existing = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: 'pattern-review',
                state: 'open',
                per_page: 100
              });

              const alreadyExists = existing.data.some(
                i => i.title.includes(group.title.slice(0, 40))
              );

              if (alreadyExists) {
                console.log(`Meta-issue already exists for: ${group.title}`);
                continue;
              }

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[pattern-review] ${group.title} (${group.count} reports)`,
                labels: ['pattern-review', 'priority'],
                body: [
                  `## Pattern Review`,
                  '',
                  `**${group.count} community reports** for this pattern.`,
                  `**Category:** ${group.category}`,
                  '',
                  `## Linked Reports`,
                  '',
                  linkedIssues,
                  '',
                  `## Action Required`,
                  '',
                  '- [ ] Reproduce the reported behavior',
                  '- [ ] Determine if pattern needs suppression rule, fix, or is working correctly',
                  '- [ ] Implement fix if needed',
                  '- [ ] Comment on linked issues when resolved',
                  '',
                  '---',
                  '*Auto-generated by feedback triage workflow.*'
                ].join('\n')
              });

              console.log(`Created meta-issue: ${group.title} (${group.count} reports)`);
            }

      - name: Close-the-loop on fixed patterns
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            // Find resolved pattern-review issues
            const resolved = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'pattern-review',
              state: 'closed',
              since: new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString(),
              per_page: 50
            });

            for (const metaIssue of resolved.data) {
              // Extract linked issue numbers from body
              const linkedNumbers = [...metaIssue.body.matchAll(/#(\d+)/g)]
                .map(m => parseInt(m[1]))
                .filter(n => n !== metaIssue.number);

              for (const num of linkedNumbers) {
                try {
                  const issue = await github.rest.issues.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: num
                  });

                  if (issue.data.state === 'open') {
                    await github.rest.issues.createComment({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: num,
                      body: `This was addressed in #${metaIssue.number}. Thank you for the feedback — it directly improved agent4s for everyone.\n\nClosing automatically.`
                    });

                    await github.rest.issues.update({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: num,
                      state: 'closed',
                      state_reason: 'completed'
                    });
                  }
                } catch (e) {
                  console.log(`Could not process #${num}: ${e.message}`);
                }
              }
            }
