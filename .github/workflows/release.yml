name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            artifact: scalex-macos-arm64
          - os: macos-15-intel
            artifact: scalex-macos-x64
          - os: ubuntu-24.04
            artifact: scalex-linux-x64
          - os: windows-2022
            artifact: scalex-windows-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: graalvm/setup-graalvm@03e8abf916fd0e281b2efe7b2da3378bb0a1d085 # v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: VirtusLab/scala-cli-setup@59e308800210b0414d2d7190068c80021e1b3e5d # v1
        with:
          power: true
          jvm: graalvm-java21

      - name: Configure Visual Studio (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@a102174a2b586eec2ea151a69e6fd14404a8ce7c # v1.13.0

      - name: Build native image (Unix)
        if: runner.os != 'Windows'
        run: ./build-native.sh ${{ matrix.artifact }}

      - name: Build native image (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          scala-cli.bat package --native-image \
            src/ \
            -o "${{ matrix.artifact }}.exe" \
            --force \
            -- --no-fallback \
            --initialize-at-run-time=com.google.common.hash.Striped64,com.google.common.hash.LongAdder,com.google.common.hash.BloomFilter,com.google.common.hash.BloomFilterStrategies \
            --exclude-config ".*jline.*" ".*"

      - name: Test binary (Unix)
        if: runner.os != 'Windows'
        run: |
          ./${{ matrix.artifact }} help
          ./${{ matrix.artifact }} index .
          ./${{ matrix.artifact }} search . Scalex
          ./${{ matrix.artifact }} def . SymbolKind
          ./${{ matrix.artifact }} symbols . src/model.scala

      - name: Test binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          ./${{ matrix.artifact }}.exe help
          ./${{ matrix.artifact }}.exe index .
          ./${{ matrix.artifact }}.exe search . Scalex
          ./${{ matrix.artifact }}.exe def . SymbolKind
          ./${{ matrix.artifact }}.exe symbols . src/model.scala

      - name: Generate checksum (Unix)
        if: runner.os != 'Windows'
        run: shasum -a 256 ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Generate checksum (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: sha256sum ${{ matrix.artifact }}.exe > ${{ matrix.artifact }}.exe.sha256

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: runner.os != 'Windows'
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: runner.os == 'Windows'
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.exe
            ${{ matrix.artifact }}.exe.sha256

  release:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts

      - name: Make binaries executable
        run: chmod +x artifacts/*/scalex-macos-* artifacts/*/scalex-linux-*

      - name: Generate combined checksums
        run: |
          cd artifacts
          shasum -a 256 */scalex-macos-arm64 */scalex-macos-x64 */scalex-linux-x64 */scalex-windows-x64.exe | sed 's|[^/]*/||' > ../checksums.txt
          cd ..
          echo "Generated checksums.txt:"
          cat checksums.txt

      - name: Attest build provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: |
            artifacts/*/scalex-macos-arm64
            artifacts/*/scalex-macos-x64
            artifacts/*/scalex-linux-x64
            artifacts/*/scalex-windows-x64.exe

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found" CHANGELOG.md)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            artifacts/*/scalex-*
            checksums.txt
          body: ${{ steps.changelog.outputs.body }}
