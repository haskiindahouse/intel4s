name: AI Quality Gates

on:
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: graalvm/setup-graalvm@03e8abf916fd0e281b2efe7b2da3378bb0a1d085 # v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: VirtusLab/scala-cli-setup@59e308800210b0414d2d7190068c80021e1b3e5d # v1
        with:
          power: true
          jvm: graalvm-java21

      # === COMPILE (zero warnings) ===
      - name: Compile
        run: |
          OUTPUT=$(scala-cli compile src/ 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi warn; then
            echo "::error::Compilation warnings detected"
            exit 1
          fi

      # === DEPRECATIONS ===
      - name: Check deprecations
        run: |
          OUTPUT=$(scala-cli compile --scalac-option "-deprecation" src/ 2>&1)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -qi warn; then
            echo "::error::Deprecation warnings detected"
            exit 1
          fi

      # === TESTS ===
      - name: Tests
        run: scala-cli test src/ tests/

      # === DEPENDENCY CHANGE ALERT ===
      - name: Dependency change alert
        run: |
          if git diff origin/main --name-only | grep -qE "^src/project\.scala$"; then
            echo "::warning::Dependency change detected in src/project.scala — requires manual review (Invariant #2)"
          fi

      # === SECRETS SCAN ===
      - name: Secrets scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
